services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail-system-app
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  db:
    image: postgres:16
    container_name: mail-system-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailutskick}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - mail_system_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mail_system_postgres_data:
